<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrakis War Table — Spice Wars Match Replay</title>
<meta name="description" content="Dune: Spice Wars match replay decoded from a .sav — Voronoi Arrakis map, faction ownership, conflict timeline.">
</head>
<body>
<style>
  :root{
    --bg:#0b0e17; --bg2:#0e1220; --panel:#131a2b; --panel2:#0f1524;
    --line:#243049; --line2:#1a2136;
    --ink:#e8ecf5; --ink-mut:#9aa4bd; --ink-dim:#66708a;
    --spice:#e9963c; --spice-glo:#f6b45a;
    --good:#37b26a; --warn:#e6a93c; --crit:#e5514f;
    --sel:#f6b45a;
    --radius:10px;
    --mono: ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --shadow: 0 8px 30px rgba(0,0,0,.45);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#efe7d6; --bg2:#e7ddc8; --panel:#f7f1e4; --panel2:#efe6d3;
      --line:#d3c6a8; --line2:#e0d5bd;
      --ink:#2a2415; --ink-mut:#6d6144; --ink-dim:#9a8c68;
      --spice:#c26a1c; --spice-glo:#d9862c;
      --sel:#b5560e;
      --shadow: 0 8px 26px rgba(120,96,40,.20);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0b0e17; --bg2:#0e1220; --panel:#131a2b; --panel2:#0f1524;
    --line:#243049; --line2:#1a2136; --ink:#e8ecf5; --ink-mut:#9aa4bd; --ink-dim:#66708a;
    --spice:#e9963c; --spice-glo:#f6b45a; --sel:#f6b45a; --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  :root[data-theme="light"]{
    --bg:#efe7d6; --bg2:#e7ddc8; --panel:#f7f1e4; --panel2:#efe6d3;
    --line:#d3c6a8; --line2:#e0d5bd; --ink:#2a2415; --ink-mut:#6d6144; --ink-dim:#9a8c68;
    --spice:#c26a1c; --spice-glo:#d9862c; --sel:#b5560e; --shadow:0 8px 26px rgba(120,96,40,.20);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:
      radial-gradient(1200px 700px at 72% -10%, color-mix(in srgb,var(--spice) 8%, transparent), transparent 60%),
      radial-gradient(900px 600px at 8% 110%, color-mix(in srgb,#3a5fb0 10%, transparent), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1400px; margin:0 auto; padding:18px 20px 40px; min-height:100%;}

  /* ---- header ---- */
  header.top{display:flex; align-items:flex-end; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:14px;}
  .brand{display:flex; flex-direction:column; gap:2px;}
  .brand .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:var(--spice);}
  .brand h1{font-family:var(--serif); font-weight:600; font-size:29px; margin:0; letter-spacing:.01em; line-height:1.05; text-wrap:balance;}
  .brand h1 .sub{color:var(--ink-mut); font-style:italic; font-weight:500;}
  .head-right{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

  .prov{display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end; font-family:var(--mono); font-size:10.5px;}
  .head-right{max-width:100%;}
  .chip{display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:100px; border:1px solid var(--line); background:var(--panel2); color:var(--ink-mut); letter-spacing:.04em; text-transform:uppercase;}
  .chip b{color:var(--ink); font-weight:600;}
  .chip.ok{border-color:color-mix(in srgb,var(--good) 45%,var(--line)); color:color-mix(in srgb,var(--good) 80%,var(--ink));}
  .chip.est{border-color:color-mix(in srgb,var(--warn) 45%,var(--line)); color:color-mix(in srgb,var(--warn) 85%,var(--ink));}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;}
  .themebtn{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mut);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;}
  .themebtn:hover{color:var(--ink);border-color:var(--ink-dim)}

  /* ---- match tabs ---- */
  .tabs{display:flex; gap:2px; align-items:stretch; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:4px; overflow-x:auto;}
  .tabs::-webkit-scrollbar{height:6px} .tabs::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .tab{white-space:nowrap; font-family:var(--mono); font-size:12px; color:var(--ink-mut); padding:6px 12px; border-radius:7px; cursor:pointer; border:1px solid transparent; letter-spacing:.02em;}
  .tab:hover{color:var(--ink); background:var(--panel);}
  .tab.active{color:var(--bg); background:var(--spice); border-color:var(--spice); font-weight:600; box-shadow:0 2px 10px color-mix(in srgb,var(--spice) 45%,transparent);}
  :root[data-theme="light"] .tab.active,:root:not([data-theme="dark"]) .tab.active{color:#fff}
  .tab .muted{opacity:.6}
  .tab.ghost{opacity:.5}
  .tab.ghost:hover{opacity:.8}

  /* ---- timeline ---- */
  .timeline{margin:12px 0 14px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px 16px 14px; box-shadow:var(--shadow);}
  .tl-row{display:flex; align-items:center; gap:14px;}
  .transport{display:flex; align-items:center; gap:6px;}
  .tbtn{width:34px;height:34px;display:grid;place-items:center;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);cursor:pointer;}
  .tbtn:hover{border-color:var(--spice);color:var(--spice)}
  .tbtn.play{width:40px;height:40px;background:var(--spice);border-color:var(--spice);color:#111;}
  .tbtn.play:hover{background:var(--spice-glo);color:#111}
  .tbtn svg{width:16px;height:16px;fill:currentColor}
  .speed{font-family:var(--mono);font-size:12px;color:var(--ink-mut);border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:6px 8px;cursor:pointer;min-width:44px;text-align:center}
  .speed:hover{color:var(--ink)}
  .clock{font-family:var(--mono); display:flex; flex-direction:column; align-items:flex-end; min-width:120px;}
  .clock .big{font-size:20px; font-weight:600; letter-spacing:.02em; font-variant-numeric:tabular-nums;}
  .clock .small{font-size:11px; color:var(--ink-mut); letter-spacing:.05em;}

  .track-wrap{flex:1; position:relative; padding:16px 0 4px;}
  .track{position:relative; height:8px; border-radius:6px; background:linear-gradient(90deg,var(--line2),var(--line)); cursor:pointer;}
  .track-fill{position:absolute; left:0; top:0; bottom:0; border-radius:6px; background:linear-gradient(90deg,color-mix(in srgb,var(--spice) 55%,transparent),var(--spice)); pointer-events:none;}
  .playhead{position:absolute; top:-5px; width:2px; height:18px; background:var(--sel); box-shadow:0 0 10px var(--sel); transform:translateX(-1px); pointer-events:none;}
  .playhead::after{content:"";position:absolute;top:-5px;left:-4px;width:10px;height:10px;border-radius:50%;background:var(--sel);box-shadow:0 0 10px var(--sel);}
  .ev-tick{position:absolute; top:-3px; width:3px; height:14px; border-radius:2px; transform:translateX(-1.5px); opacity:.8; cursor:pointer;}
  .ev-tick:hover{opacity:1; height:18px; top:-5px;}
  .axis{position:relative; height:14px; margin-top:6px; font-family:var(--mono); font-size:10px; color:var(--ink-dim);}
  .axis span{position:absolute; transform:translateX(-50%); letter-spacing:.03em;}
  .tl-note{font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); margin-top:8px; letter-spacing:.02em; display:flex; gap:8px; align-items:center;}
  .tl-note b{color:var(--ink-mut);font-weight:600}

  /* ---- main grid ---- */
  .grid{display:grid; grid-template-columns: minmax(0,1fr) 320px; gap:16px; align-items:start;}
  @media (max-width:1080px){ .grid{grid-template-columns:1fr} }

  .mapcard{position:relative; background:radial-gradient(120% 120% at 50% 20%, var(--panel), var(--panel2)); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; aspect-ratio: 1 / 0.92;}
  .mapcard svg{width:100%; height:100%; display:block; touch-action:none;}
  .map-scrim{position:absolute;inset:0;pointer-events:none;background:radial-gradient(140% 100% at 50% 0%, transparent 55%, rgba(0,0,0,.28));}
  :root[data-theme="light"] .map-scrim{background:radial-gradient(140% 100% at 50% 0%, transparent 60%, rgba(90,70,30,.10))}
  .map-legend-mini{position:absolute; left:12px; bottom:10px; display:flex; gap:12px; font-family:var(--mono); font-size:10.5px; color:var(--ink-mut); pointer-events:none; flex-wrap:wrap; max-width:70%;}
  .map-legend-mini i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}

  .cell{stroke-linejoin:round; transition:opacity .12s;}
  .cell.dim{opacity:.35}
  .fborder{fill:none; stroke-linecap:round; pointer-events:none;}
  .zlabel{font-family:var(--mono); font-size:7px; fill:var(--ink); opacity:.0; pointer-events:none; text-anchor:middle;}
  .icon{pointer-events:none}
  .pulse{transform-box:fill-box; transform-origin:center;}

  /* ---- right rail ---- */
  .rail{display:flex; flex-direction:column; gap:14px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
  .card h2{font-family:var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-mut); margin:0; padding:12px 14px 8px; display:flex; justify-content:space-between; align-items:center;}
  .card h2 .count{color:var(--spice); font-weight:600;}
  .card .body{padding:4px 12px 12px;}

  /* regions held bars */
  .rh-row{display:grid; grid-template-columns: 16px 1fr auto; gap:9px; align-items:center; padding:6px 2px; font-size:13px;}
  .rh-sw{width:12px;height:12px;border-radius:3px; box-shadow:0 0 0 1px rgba(255,255,255,.06) inset;}
  .rh-name{display:flex;flex-direction:column;}
  .rh-name .n{font-weight:600;}
  .rh-name .meta{font-family:var(--mono); font-size:10px; color:var(--ink-dim); letter-spacing:.03em;}
  .rh-name .meta.lost{color:var(--crit)}
  .rh-val{font-family:var(--mono); font-weight:600; font-variant-numeric:tabular-nums; font-size:15px;}
  .rh-bar{grid-column:1 / -1; height:5px; border-radius:4px; background:var(--line2); overflow:hidden; margin-top:2px;}
  .rh-bar i{display:block;height:100%;border-radius:4px;}

  /* wars/events list */
  .ev-list{display:flex; flex-direction:column; max-height:290px; overflow:auto;}
  .ev-list::-webkit-scrollbar{width:7px} .ev-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .ev-item{display:grid; grid-template-columns:auto 1fr auto; gap:9px; align-items:center; padding:7px 4px; border-bottom:1px solid var(--line2); cursor:pointer;}
  .ev-item:last-child{border-bottom:0}
  .ev-item:hover{background:var(--panel2)}
  .ev-item.future{opacity:.32}
  .ev-item.active{background:color-mix(in srgb,var(--spice) 12%,transparent)}
  .ev-ic{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:12px;flex:none}
  .ev-main{min-width:0}
  .ev-main .k{font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ev-main .r{font-family:var(--mono); font-size:10.5px; color:var(--ink-mut); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ev-time{font-family:var(--mono); font-size:12px; color:var(--ink-mut); font-variant-numeric:tabular-nums; text-align:right}

  /* legend */
  .legend{display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; padding:6px 14px 14px;}
  .lg{display:flex; gap:8px; align-items:center; font-size:11.5px; color:var(--ink-mut);}
  .lg .g{width:20px; flex:none; display:grid; place-items:center;}
  .lg b{color:var(--ink); font-weight:600}
  .lg svg{width:16px;height:16px}

  /* tooltip */
  .tip{position:fixed; z-index:50; pointer-events:none; background:color-mix(in srgb,var(--panel) 96%, black); border:1px solid var(--line); border-radius:9px; box-shadow:var(--shadow); padding:9px 11px; font-size:12px; max-width:230px; opacity:0; transform:translateY(4px); transition:opacity .1s;}
  .tip.show{opacity:1; transform:none;}
  .tip .tt{font-family:var(--serif); font-size:14px; font-weight:600; margin-bottom:2px; display:flex; align-items:center; gap:7px;}
  .tip .owner{font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; text-transform:uppercase;}
  .tip .rows{margin-top:5px; display:flex; flex-direction:column; gap:2px; font-family:var(--mono); font-size:11px; color:var(--ink-mut);}
  .tip .rows b{color:var(--ink); font-weight:600}
  .swz{width:9px;height:9px;border-radius:2px;display:inline-block}

  footer.foot{margin-top:22px; font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); letter-spacing:.02em; line-height:1.6; border-top:1px solid var(--line2); padding-top:12px;}
  footer.foot b{color:var(--ink-mut); font-weight:600}
  .drop{display:inline-flex;align-items:center;gap:6px;color:var(--ink-mut);cursor:pointer;border:1px dashed var(--line);border-radius:7px;padding:4px 9px;font-family:var(--mono);font-size:10.5px}
  .drop:hover{border-color:var(--spice);color:var(--ink)}
  input[type=file]{display:none}

  @media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }
</style>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <span class="eyebrow">Dune · Spice Wars — decoded from <code>.sav</code></span>
      <h1>Arrakis War Table <span class="sub">— match replay</span></h1>
    </div>

      <div class="prov" id="prov"></div>
      <button class="themebtn" id="themebtn" type="button">Theme</button>
    </div>

  <div class="tabs" id="tabs"></div>

  <section class="timeline" aria-label="Match timeline">
    <div class="tl-row">
      <div class="transport">
        <button class="tbtn" id="toStart" type="button" title="Jump to start" aria-label="Jump to start"><svg viewBox="0 0 24 24"><path d="M6 5h2v14H6zm3 7l9 7V5z"/></svg></button>
        <button class="tbtn play" id="play" type="button" title="Play / pause" aria-label="Play or pause"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="tbtn" id="toEnd" type="button" title="Jump to end" aria-label="Jump to end"><svg viewBox="0 0 24 24"><path d="M16 5h2v14h-2zM6 5l9 7-9 7z"/></svg></button>

      </div>
      <div class="track-wrap">
        <div class="track" id="track">
          <div class="track-fill" id="fill"></div>
          <div class="playhead" id="playhead"></div>
        </div>
        <div class="axis" id="axis"></div>
      </div>
      <div class="clock">
        <span class="big" id="clockBig">0:00</span>
        <span class="small" id="clockSmall">Day 0</span>

    </div>
    <div class="tl-note" id="tlnote"></div>
  </section>

  <div class="grid">
    <div class="mapcard">
      <svg id="map" viewBox="-1.02 -1.02 2.04 2.04" preserveAspectRatio="xMidYMid meet" aria-label="Arrakis territory map"></svg>
      <div class="map-scrim"></div>
      <div class="map-legend-mini" id="mapkey"></div>
    </div>

    <aside class="rail">
      <div class="card">
        <h2>Regions held <span class="count" id="rhTotal"></span></h2>
        <div class="body" id="regionsHeld"></div>
      </div>
      <div class="card">
        <h2>Conflict log <span class="count" id="warCount"></span></h2>
        <div class="body" style="padding:2px 8px 8px"><div class="ev-list" id="warList"></div></div>
      </div>
      <div class="card">
        <h2>Legend</h2>
        <div class="legend" id="legend"></div>
      </div>
    </aside>
  </div>

  <footer class="foot" id="foot"></footer>
</div>

<div class="tip" id="tip"></div>

function mix(a,b,t){ // hex mix (accepts #rgb or #rrggbb)
  const norm=h=>{ h=h.replace('#',''); if(h.length===3) h=h.split('').map(x=>x+x).join(''); return h; };
  const p=h=>{ h=norm(h); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; };
  const A=p(a),B=p(b); const c=A.map((v,i)=>Math.round(v+(B[i]-v)*t));
  return "#"+c.map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,"0")).join("");
}

function scat(k){ if(CAP.has(k))return"MainBase"; if(k==="Village")return"Village"; if(SIETCH.has(k))return"Sietch"; if(k==="RenegadeBase"||k==="RenegadeDrop")return"Renegade"; if(POI.has(k))return"POI"; return null; }
const CONFLICT=new Set(["Rebellion","MainBaseDestroyed","MBUnderSiege","VillageOccupationAction","VillagePillage","SietchPillage","SietchAttack","UnitEaten","UnitEatenInTerritory","UnitKilled","Operation","SpecialRegionControlled","HeroKilledByTFaction","PlayerDefeat","TruceBroken_Traitor"]);
const worldTx=v=>Math.round((v-1000)/1000*10000)/10000;  // world posx/posy -> normalized [-1,1]
function curateStructures(raw){ return (raw||[]).map(s=>{ const type=scat(s.kind); if(!type)return null;
  return {type, kind:s.kind, owner:s.owner, zoneId:s.zoneNum,
    cx:s.cx!=null?worldTx(s.cx):null, cy:s.cy!=null?worldTx(s.cy):null,
    rebelling:!!s.rebelling, traits:s.villageTraits||[], placeName:s.placeName||null}; }).filter(Boolean); }
function curateEvents(raw){ return (raw||[]).filter(e=>CONFLICT.has(e.kind)).map(e=>({
    minute:Math.round((e.minute!=null?e.minute:(e.time||0)/60)*10)/10, kind:e.kind, zoneId:e.zoneNum,
    regionName:e.regionName||e.regionId||null, instigator:e.instigator||null, targetFaction:e.targetFaction||null
  })).sort((a,b)=>a.minute-b.minute); }

let OWN={}, PROV, STRUCTS=[], EVENTS=[], WARS=[];
function buildOwnership(){
  if(STATE && STATE.zoneOwnersById && Object.keys(STATE.zoneOwnersById).length){
    OWN = {...STATE.zoneOwnersById};
    STRUCTS = curateStructures(STATE.structures);
    EVENTS = curateEvents(STATE.events);
    WARS = STATE.wars||[];
    PROV = STATE.provenance || {ownership:"decoded", events:"decoded"};
    // merge decoded faction stats (resources, regionsHeld, name) into roster
    if(STATE.factions){ const byId={}; STATE.factions.forEach(f=>byId[f.id]=f);
      MAPDATA.factions.forEach(f=>{ const s=byId[f.id]; if(s){ f.resources=s.resources; f.regionsHeld=s.regionsHeld; f.dname=s.name; f.status=s.status; f.isAI=s.isAI; f.hasLost=s.hasLost; } }); }
    return;
  }
  // illustrative reconstruction: contiguous blobs by BFS from seed zones,
  // roughly balanced; a lost faction gets none; ~9-12 neutral.
  PROV = {ownership:"illustrative", events:"illustrative"};
  const active = MAPDATA.factions.filter(f=>!f.hasLost).map(f=>f.id);
  const zoneIds = MAPDATA.zones.map(z=>z.id).filter(id=>cellsByZone[id]);
  // seeds: spread-out zones
  const seeds={}; const used=new Set();
  const corners={Fremen:[-.6,-.6],Atreides:[-.5,.55],Smugglers:[.55,.5],Vernius:[.6,-.5],Harkonnen:[.2,-.7],Corrino:[0,.6],Ecaz:[-.7,.1]};
  active.forEach(f=>{ const pref=corners[f]||[Math.random()-.5,Math.random()-.5];
    let best=null,bd=1e9; for(const z of zoneIds){ if(used.has(z))continue; const Z=zoneById[z]; const d=(Z.cx-pref[0])**2+(Z.cy-pref[1])**2; if(d<bd){bd=d;best=z;} }
    seeds[f]=best; if(best)used.add(best); });
  active.forEach(f=>{ if(seeds[f])OWN[seeds[f]]=f; });
  // grow round-robin
  const target = Math.floor((zoneIds.length-10)/active.length);
  const counts={}; active.forEach(f=>counts[f]=1);
  let progress=true;
  while(progress){ progress=false;
    for(const f of active){ if(counts[f]>=target) continue;
      // find a neutral zone adjacent to f's territory, closest to seed
      let pick=null,pd=1e9;
      for(const z of zoneIds){ if(OWN[z])continue;
        let adjF=false; for(const n of zoneAdj[z]) if(OWN[n]===f){adjF=true;break;}
        if(!adjF)continue; const Z=zoneById[z],S=zoneById[seeds[f]]; const d=(Z.cx-S.cx)**2+(Z.cy-S.cy)**2; if(d<pd){pd=d;pick=z;}
      }
      if(pick){ OWN[pick]=f; counts[f]++; progress=true; }
    }
  }
  MAPDATA.factions.forEach(f=>{ f._held = Object.values(OWN).filter(v=>v===f.id).length; });
  // illustrative structures: a main base near each faction seed centroid, sietch markers on sietch zones
  STRUCTS=[];
  active.forEach(f=>{ const z=zoneById[seeds[f]]; if(z) STRUCTS.push({type:"MainBase",owner:f,zoneId:z.id,cx:z.cx,cy:z.cy}); });
  MAPDATA.zones.forEach(z=>{ if(z.si) STRUCTS.push({type:"Sietch",owner:OWN[z.id]||"Neutral",zoneId:z.id,cx:z.mineral?z.mineral[0]:z.cx,cy:z.mineral?z.mineral[1]:z.cy}); });
  // a few illustrative villages
  Object.keys(OWN).forEach(zid=>{ const z=zoneById[+zid]; if(z && !z.si && Math.random()<.5) STRUCTS.push({type:"Village",owner:OWN[zid],zoneId:+zid,cx:z.cx+ (Math.random()-.5)*.06,cy:z.cy+(Math.random()-.5)*.06}); });
  EVENTS=[]; // no fabricated timeline; real events come from the hxbit walk
}

/* regionsHeld per faction (from decoded ownership if present) */
function computeHeld(){
  MAPDATA.factions.forEach(f=>{ f._held = Object.values(OWN).filter(v=>v===f.id).length; });
  const neutral = MAPDATA.zones.filter(z=>cellsByZone[z.id]).length - Object.values(OWN).filter(v=>v&&v!=="Neutral").length;
  return neutral;
}

const map=$("#map");

function drawMap(){
  map.innerHTML="";
  const gCells=svgEl("g",{}); const gBord=svgEl("g",{}); iconLayer=svgEl("g",{}); pulseLayer=svgEl("g",{});
  cellNodes={}; borderNodes=[];
  // cells
  MAPDATA.cells.forEach(c=>{
    if(!c.p||!c.p.length) return;
    const d="M"+c.p.map(p=>p[0].toFixed(4)+" "+p[1].toFixed(4)).join("L")+"Z";
    const path=svgEl("path",{d, class:"cell", "data-zone":c.z, "data-cell":c.id});
    gCells.appendChild(path);
    (cellNodes[c.z]=cellNodes[c.z]||[]).push({node:path, biome:c.b});
  });
  // faction borders (shared edges where owners differ) + neutral zone edges
  MAPDATA.edges.forEach(([a,b,seg])=>{
    const za=cellZoneOf(a), zb=cellZoneOf(b);
    const line=svgEl("path",{d:`M${seg[0]} ${seg[1]}L${seg[2]} ${seg[3]}`, class:"fborder", "data-a":za, "data-b":zb});
    gBord.appendChild(line); borderNodes.push({node:line, za, zb});
  });
  map.appendChild(gCells); map.appendChild(gBord); map.appendChild(iconLayer); map.appendChild(pulseLayer);
  paintOwnership();
  drawIcons();
  // interactions
  gCells.addEventListener("mousemove",onCellHover);
  gCells.addEventListener("mouseleave",()=>hideTip());

function paintOwnership(){
  // fill each cell by its zone's owner, tinted by biome
  for(const zid in cellNodes){
    const owner=OWN[zid];
    cellNodes[zid].forEach(({node,biome})=>{
      const bt=BIOME[biome]||"#8a7a55";
      let fill;
      if(owner){ fill=mix(facColor(owner), bt, 0.26); }
      else { fill=mix("#2a3346", bt, 0.5); fill=mix(fill,"#20283a",.3); }
      node.setAttribute("fill", fill);
      node.setAttribute("stroke", owner?mix(facColor(owner),"#000",.45):"#141a28");
      node.setAttribute("stroke-width","0.0022");
      node.setAttribute("stroke-opacity",".55");
    });
  }
  // borders: bright where owners differ, faint where same
  borderNodes.forEach(({node,za,zb})=>{
    const oa=OWN[za], ob=OWN[zb];
    if(za===zb){ node.setAttribute("stroke","transparent"); return; }
    if(oa && ob && oa!==ob){ node.setAttribute("stroke", "#0c0f18"); node.setAttribute("stroke-width","0.0135"); node.setAttribute("stroke-opacity",".9"); }
    else if(oa!==ob){ // zone boundary, at least one neutral
      node.setAttribute("stroke","#0c0f18"); node.setAttribute("stroke-width","0.006"); node.setAttribute("stroke-opacity",".6");
    }
  });
  // second pass: draw faction-coloured glow on owner-diff borders
  borderNodes.forEach(({node,za,zb})=>{
    const oa=OWN[za], ob=OWN[zb];
    if(oa&&ob&&oa!==ob){ node.setAttribute("stroke", mix(facColor(oa),facColor(ob),.5)); node.setAttribute("stroke-opacity",".85"); node.setAttribute("stroke-width","0.009"); }
  });
}

function coordOf(s){ if(s.cx!=null&&isFinite(s.cx)) return [s.cx,s.cy]; const z=zoneById[s.zoneId]; return z?[z.cx,z.cy]:null; }
function drawIcons(){

  // renegade bases
  STRUCTS.filter(s=>s.type==="Renegade").forEach(s=>{ const p=coordOf(s); if(!p)return;
    add(p[0],p[1],`<path d="M0 -0.019 L0.017 0.014 L-0.017 0.014 Z" fill="#c8483c" stroke="#0b0e17" stroke-width="0.003"/>`); });
  // main bases — prominent, top layer
  STRUCTS.filter(s=>s.type==="MainBase").forEach(s=>{ const p=coordOf(s); if(!p)return; const col=facIconColor(s.owner);
    add(p[0],p[1],`<circle r="0.03" fill="#0b0e17" fill-opacity="0.5"/><circle r="0.028" fill="none" stroke="${col}" stroke-width="0.006"/><circle r="0.012" fill="${col}" stroke="#0b0e17" stroke-width="0.003"/>`); });
  iconLayer.appendChild(frag);
}

/* ============================================================
   Timeline events (played back at their timestamps)

  Rebellion:{ic:"⚑",col:"#e5514f",label:"Rebellion",cat:"unrest"},

const evStyle=k=>EVENT_STYLE[k]||EVENT_STYLE.default;

/* ============================================================
   Render panels
   ============================================================ */
function renderProvenance(){
  const p=$("#prov"); p.innerHTML="";
  const add=(label,val,cls)=>{ const c=el("span","chip "+(cls||"")); c.innerHTML=`<span class="dot"></span>${label}: <b>${val}</b>`; p.appendChild(c); };

}

function renderTabs(){
  const tabs=$("#tabs"); tabs.innerHTML="";
  const active=(MAPDATA.meta&&MAPDATA.meta.file)||"loaded save";
  const ghosts=["jeff_s_Game.sav","Vernius first game.sav","Jox win.sav","260717-2.sav"].filter(f=>f!==active);
  const saves=[{f:active, active:true}, ...ghosts.map(f=>({f, ghost:true}))];
  saves.forEach(s=>{ const t=el("div","tab"+(s.active?" active":"")+(s.ghost?" ghost":"")); t.textContent=s.f;
    if(s.ghost){ t.title="Decode with parse_sav.js and load the JSON below"; }
    tabs.appendChild(t);
  });
}

function renderRegionsHeld(){
  const neutral=computeHeld();
  const box=$("#regionsHeld"); box.innerHTML="";
  const facRows=MAPDATA.factions.map(f=>({id:f.id,held:(f.regionsHeld!=null?f.regionsHeld:(f._held||0)),lost:f.hasLost,ai:f.isAI,diff:f.difficulty,res:f.resources}));
  const rows=facRows.concat([{id:"Neutral",held:Math.max(0,neutral),neutral:true}]);
  rows.sort((a,b)=>b.held-a.held);
  const max=Math.max(1,...rows.map(r=>r.held));
  const total=MAPDATA.zones.filter(z=>cellsByZone[z.id]).length;
  $("#rhTotal").textContent=total+" zones";
  rows.forEach(r=>{
    const row=el("div","rh-row");
    const col=r.neutral?FACTIONS.Neutral.color:facColor(r.id);
    let sub = r.neutral?"open / sietch":(r.lost?"eliminated":(r.ai?("AI · difficulty "+r.diff):"you"));
    if(r.res && r.res.Spice!=null) sub += ` · <span style="color:var(--spice)">${fmtNum(r.res.Spice)} spice</span>`;
    row.innerHTML=`<span class="rh-sw" style="background:${col}"></span>
      <span class="rh-name"><span class="n">${r.neutral?"Neutral":facName(r.id)}</span>
      <span class="meta ${r.lost?'lost':''}">${sub}</span></span>
      <span class="rh-val">${r.held}</span>
      <span class="rh-bar"><i style="width:${r.held/max*100}%;background:${col}"></i></span>`;
    box.appendChild(row);
  });
  if(WARS && WARS.length){
    const dip=el("div"); dip.style.cssText="margin-top:11px;padding-top:10px;border-top:1px solid var(--line2);display:flex;flex-direction:column;gap:5px";
    const head=el("div"); head.style.cssText="font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:1px"; head.textContent="Diplomacy"; dip.appendChild(head);
    WARS.forEach(w=>{ const st=w.status; const c=st==="war"?"var(--crit)":st==="allied"?"var(--good)":"var(--ink-mut)";
      const r=el("div"); r.style.cssText="display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-mut)";
      r.innerHTML=`<span class="rh-sw" style="width:8px;height:8px;background:${facColor(w.a)}"></span>
        <span class="rh-sw" style="width:8px;height:8px;background:${facColor(w.b)}"></span>
        <span>${facName(w.a)} · ${facName(w.b)}</span>
        <b style="margin-left:auto;color:${c};font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase">${st}</b>`;
      dip.appendChild(r);
    });
    box.appendChild(dip);
  }
}

function renderWars(){
  const list=$("#warList"); list.innerHTML="";
  $("#warCount").textContent = EVENTS.length? EVENTS.length : "—";
  if(!EVENTS.length){
    const empty=el("div"); empty.style.cssText="font-family:var(--mono);font-size:11px;color:var(--ink-dim);padding:14px 6px;line-height:1.6";
    empty.innerHTML=`No decoded event timeline loaded.<br>The save's <b>dataEvents</b> log (rebellions, sieges, pillages, base-loss) plots here once the hxbit game-state walk is applied — see the footer.`;
    list.appendChild(empty); return;
  }
  EVENTS.forEach((e,i)=>{
    const st=evStyle(e.kind);
    const region = e.regionName || (e.zoneId!=null && zoneById[e.zoneId] ? zoneById[e.zoneId].rn : null);
    const secondary = [region, e.targetFaction?("→ "+facName(e.targetFaction)):null].filter(Boolean).join("  ") || "—";
    const item=el("div","ev-item"); item.dataset.i=i; item.dataset.min=e.minute;
    item.innerHTML=`<span class="ev-ic" style="background:${mix(st.col,'#0b0e17',.55)};color:${st.col}">${st.ic}</span>
      <span class="ev-main"><span class="k">${st.label}${e.instigator?` · ${facName(e.instigator)}`:""}</span>
      <span class="r">${secondary}</span></span>
      <span class="ev-time">${fmtTime(e.minute)}</span>`;
    item.addEventListener("click",()=>setTime(e.minute));
    list.appendChild(item);
  });
}

function renderLegend(){

  const items=[
    ["MainBase",`<svg viewBox="-.04 -.04 .08 .08" fill="#cdd3e0" stroke="#0b0e17" stroke-width="0.004"><circle r="0.026" fill="none" stroke-width="0.006"/><circle r="0.012"/></svg>`,"Main base"],

    ["Renegade",`<svg viewBox="-.04 -.04 .08 .08" fill="#c8483c"><path d="M0 -0.024 L0.022 0.018 L-0.022 0.018 Z"/></svg>`,"Renegade base"],
    ["Spice",`<svg viewBox="-.04 -.04 .08 .08" fill="#f0a63a"><path d="M0 -0.02 L0.006 -0.006 L0.02 0 L0.006 0.006 L0 0.02 L-0.006 0.006 L-0.02 0 L-0.006 -0.006 Z"/></svg>`,"Spice field"],
    ["Battle",`<svg viewBox="-.04 -.04 .08 .08" fill="none" stroke="#e5514f" stroke-width="0.006" stroke-linecap="round"><path d="M-0.016 -0.016 L0.016 0.016 M0.016 -0.016 L-0.016 0.016"/></svg>`,"Battle / rebellion"],

  // territory colours

  MAPDATA.factions.forEach(f=>{ const s=el("span"); s.innerHTML=`<i style="background:${facColor(f.id)}"></i>${facName(f.id)}`; mk.appendChild(s); });
  const n=el("span"); n.innerHTML=`<i style="background:${FACTIONS.Neutral.color}"></i>Neutral`; mk.appendChild(n);

/* ============================================================
   Timeline mechanics
   ============================================================ */
function renderAxis(){
  const ax=$("#axis"); ax.innerHTML="";
  const marks=5;
  for(let i=0;i<=marks;i++){ const m=MATCH_MIN*i/marks; const s=el("span"); s.style.left=(i/marks*100)+"%"; s.textContent=fmtTime(m); ax.appendChild(s); }
  // event ticks
  const tw=$("#track");
  EVENTS.forEach((e,i)=>{ const st=evStyle(e.kind); const tick=el("div","ev-tick"); tick.style.left=(e.minute/MATCH_MIN*100)+"%"; tick.style.background=st.col; tick.title=`${st.label} @ ${fmtTime(e.minute)}`;
    tick.addEventListener("click",ev=>{ev.stopPropagation(); setTime(e.minute);}); tw.appendChild(tick); });
}
function setTime(m){ T=Math.max(0,Math.min(MATCH_MIN,m)); updateClock(); updateEvents(); }
function updateClock(){
  const pct=T/MATCH_MIN*100;
  $("#fill").style.width=pct+"%"; $("#playhead").style.left=pct+"%";
  $("#clockBig").textContent=fmtTime(T);
  $("#clockSmall").textContent="Day "+Math.floor(T*2); // 1 day = 30s = 0.5 min
}
function updateEvents(){
  // mark events past/future; flash active zone within a small window
  const items=[...document.querySelectorAll(".ev-item")];
  let activeZone=null;
  items.forEach(it=>{ const m=+it.dataset.min; it.classList.toggle("future", m>T+0.001);
    it.classList.toggle("active", Math.abs(m-T)<Math.max(1.2, MATCH_MIN*0.01)); });
  // pulse zones for events near playhead
  pulseLayer.innerHTML="";
  EVENTS.forEach(e=>{ if(Math.abs(e.minute-T) < Math.max(1.5, MATCH_MIN*0.012)){ const z=zoneById[e.zoneId]; if(!z)return;
    const st=evStyle(e.kind); const c=svgEl("circle",{cx:z.cx,cy:z.cy,r:0.03,fill:"none",stroke:st.col,"stroke-width":0.006,class:"pulse"});
    const an=svgEl("animate",{attributeName:"r",values:"0.02;0.06",dur:"1s",repeatCount:"indefinite"});
    const an2=svgEl("animate",{attributeName:"opacity",values:"0.9;0",dur:"1s",repeatCount:"indefinite"});
    c.appendChild(an); c.appendChild(an2); pulseLayer.appendChild(c);
  }});
}
function togglePlay(force){
  playing = force!==undefined?force:!playing;
  $("#playIcon").innerHTML = playing? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  if(playing){ if(T>=MATCH_MIN) T=0; lastTs=0; raf=requestAnimationFrame(tick); }
  else if(raf) cancelAnimationFrame(raf);
}
function tick(ts){
  if(!playing) return;
  if(!lastTs) lastTs=ts;
  const dt=(ts-lastTs)/1000; lastTs=ts;
  T += dt * speed * (MATCH_MIN/45); // full match ≈ 45s at 1×
  if(T>=MATCH_MIN){ T=MATCH_MIN; togglePlay(false); }
  updateClock(); updateEvents();
  if(playing) raf=requestAnimationFrame(tick);
}

/* track dragging */
function trackToTime(clientX){ const r=$("#track").getBoundingClientRect(); const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width)); return pct*MATCH_MIN; }
let dragging=false;
$("#track").addEventListener("pointerdown",e=>{ dragging=true; togglePlay(false); setTime(trackToTime(e.clientX)); $("#track").setPointerCapture(e.pointerId); });
$("#track").addEventListener("pointermove",e=>{ if(dragging) setTime(trackToTime(e.clientX)); });
$("#track").addEventListener("pointerup",()=>dragging=false);
$("#play").addEventListener("click",()=>togglePlay());
$("#toStart").addEventListener("click",()=>{ togglePlay(false); setTime(0); });
$("#toEnd").addEventListener("click",()=>{ togglePlay(false); setTime(MATCH_MIN); });
$("#speed").addEventListener("click",()=>{ speed=SPEEDS[(SPEEDS.indexOf(speed)+1)%SPEEDS.length]; $("#speed").textContent=speed+"×"; });

/* ============================================================
   Tooltip + selection
   ============================================================ */
const tip=$("#tip");
const TYPE_LABEL={MainBase:"main base",Village:"village",Sietch:"sietch",Renegade:"renegade base",POI:"wreck / POI"};
function showTipForZone(zid,x,y){
  const z=zoneById[zid]; if(!z)return; const owner=OWN[zid];
  const strs=STRUCTS.filter(s=>+s.zoneId===+zid);
  const byType={}; strs.forEach(s=>byType[s.type]=(byType[s.type]||0)+1);
  const strLine=Object.keys(byType).filter(t=>t!=="POI").map(t=>`${byType[t]} ${TYPE_LABEL[t]||t}${byType[t]>1?"s":""}`).join(" · ");
  const fac=MAPDATA.factions.find(f=>f.id===owner);
  const rebel=strs.some(s=>s.rebelling);
  tip.innerHTML=`<div class="tt"><span class="swz" style="background:${owner?facColor(owner):FACTIONS.Neutral.color}"></span>${z.rn}</div>
    <div class="owner" style="color:${owner?facColor(owner):'var(--ink-mut)'}">${owner?facName(owner):"Neutral / open"}${rebel?' <span style="color:var(--crit)">· in revolt</span>':''}</div>
    <div class="rows">
      <span>Biome · <b>${z.b}</b>${z.w?` · wind <b>${z.w}</b>`:''}</span>
      ${z.sp?'<span style="color:var(--spice)">◆ Spice field</span>':''}
      ${z.si&&!strLine?'<span>◈ Sietch site</span>':''}
      ${strLine?`<span>${strLine}</span>`:''}
      ${fac&&fac.resources?`<span>◆ <b style="color:var(--spice)">${fmtNum(fac.resources.Spice)}</b> spice · ✦ <b>${fmtNum(fac.resources.Solari)}</b> solari</span>`:''}
    </div>`;
  tip.classList.add("show");
  const tw=tip.getBoundingClientRect();
  let px=x+14, py=y+14; if(px+tw.width>innerWidth-8)px=x-tw.width-14; if(py+tw.height>innerHeight-8)py=y-tw.height-14;
  tip.style.left=px+"px"; tip.style.top=py+"px";
}
function hideTip(){ tip.classList.remove("show"); }
let hoverZone=null;
function onCellHover(e){ const t=e.target.closest(".cell"); if(!t){hideTip();return;} const zid=+t.dataset.zone;
  if(zid!==hoverZone){ hoverZone=zid; highlightZone(zid); } showTipForZone(zid,e.clientX,e.clientY);
}
function highlightZone(zid){
  document.querySelectorAll(".cell").forEach(n=>n.classList.toggle("dim", zid!=null && +n.dataset.zone!==zid));
}
map.addEventListener("mouseleave",()=>{ hoverZone=null; highlightZone(null); hideTip(); });
function onCellClick(e){ const t=e.target.closest(".cell"); if(!t)return; const zid=+t.dataset.zone; setTime(T); /* placeholder for future detail panel */ }

/* ============================================================
   Theme toggle
   ============================================================ */
function currentTheme(){ return document.documentElement.getAttribute("data-theme") || (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"); }
$("#themebtn").addEventListener("click",()=>{ const next=currentTheme()==="dark"?"light":"dark"; document.documentElement.setAttribute("data-theme",next); repaintTheme(); });
function repaintTheme(){ paintOwnership(); } // biome/neutral fills use fixed hex; owner fills fine either theme

/* ============================================================
   Footer + file drop (load your own decoded save)
   ============================================================ */
function renderFooter(){
  const f=$("#foot");
  const m=MAPDATA.meta;
  const dt=m.sysTime? new Date(m.sysTime*1000).toISOString().slice(0,10):"—";
  const decoded = PROV.ownership==="decoded";
  const counts = decoded? ` · <b>${STRUCTS.length}</b> structures · <b>${EVENTS.length}</b> conflict events` : "";
  // timeline note
  const tl=$("#tlnote");
  if(decoded) tl.innerHTML=`<b>${EVENTS.length}</b> recorded conflict events replay at their timestamps · sandworm strikes pulse on the map · territory = end-of-match snapshot (a single save has no per-minute ownership history).`;
  else tl.innerHTML=`Scrub the match clock · load a decoded save below for the recorded event timeline.`;
  f.innerHTML=`<b>auto.sav</b> · game <b>${m.gameVersion||"?"}</b> · seed <b>${m.seed}</b> · saved <b>${dt}</b> · match <b>${fmtTime(MATCH_MIN)}</b> (${Math.floor(MATCH_MIN*2)} days)${counts}.
  Fully decoded from the D4X <code>.sav</code>: 17-byte header → 3 sections (§1 Haxe-text config, §2 zlib→Haxe world geometry, §3 zlib→hxbit game-state). Ownership, structures &amp; the conflict log come from an exact-EOF walk of the §3 object graph.
  A single save stores the <b>current</b> ownership snapshot + a discrete event log — not per-minute history; sample successive autosaves to diff territory over time.
  <label class="drop" title="node parse_sav.js your.sav > match.json, then load it here"><input type="file" id="loadjson" accept="application/json,.json">▲ Load another match (parse_sav.js JSON)</label>`;
  const inp=$("#loadjson");
  if(inp) inp.addEventListener("change",ev=>{ const file=ev.target.files[0]; if(!file)return; const rd=new FileReader();
    rd.onload=()=>{ try{ const j=JSON.parse(rd.result); applyLoaded(j); }catch(err){ alert("Could not parse JSON: "+err.message); } };
    rd.readAsText(file); });
}
function applyLoaded(j){
  // accept parse_sav.js output: { mapdata, state }
  if(j && j.mapdata && j.mapdata.zones && j.mapdata.zones.length){ loadData({mapdata:j.mapdata, state:j.state||null}); return; }
  if(j && j.zoneOwnersById){ loadData({mapdata:MAPDATA, state:j}); return; }   // bare state object
  alert("Unrecognised file — expected parse_sav.js output { mapdata, state } from a 3-section (in-battle) save.");
}

/* ============================================================
   (Re)load a whole match and render everything
   ============================================================ */
function loadData(data){
  togglePlay(false);
  DATA=data; MAPDATA=data.mapdata||MAPDATA; STATE=data.state||null;
  rebuildDerived();
  MATCH_MIN = (MAPDATA.meta&&MAPDATA.meta.matchMinutes) || (STATE&&STATE.matchMinutes) || 60;
  buildOwnership();
  T=MATCH_MIN;
  document.querySelectorAll(".ev-tick").forEach(n=>n.remove());
  renderProvenance(); renderTabs(); drawMap(); renderRegionsHeld(); renderWars(); renderLegend();
  renderAxis(); renderFooter(); updateClock(); updateEvents();
}

/* Boot */
loadData(DATA);
</script>
